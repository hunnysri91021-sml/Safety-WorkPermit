<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสอบสถานะ Work Permit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F3D5C;
    --navy-deep:#0A2D45;
    --paper:#F6F4EE;
    --card:#FFFFFF;
    --line:#E2E0D6;
    --ink:#1C2B34;
    --sub:#6B7580;
    --safety:#E8622C;
    --ok:#2F8F5B;
    --ok-bg:#E8F5EE;
    --warn:#B8860B;
    --warn-bg:#FCF3DA;
    --bad:#C74E1E;
    --bad-bg:#FDEEE7;
    --radius:16px;
    --shadow:0 1px 2px rgba(15,61,92,.06), 0 8px 24px -12px rgba(15,61,92,.18);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"Noto Sans Thai","IBM Plex Sans Thai",sans-serif;font-size:15px;line-height:1.55;min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,.display{font-family:"IBM Plex Sans Thai","Noto Sans Thai",sans-serif;}

  .topbar{background:linear-gradient(135deg,var(--navy-deep),var(--navy) 60%);color:#fff;padding:20px;text-align:center;}
  .topbar .co{font-size:12px;letter-spacing:.06em;color:#BFD8EC;font-weight:500;}
  .topbar h1{font-size:17px;margin:4px 0 0;font-weight:700;}

  .wrap{max-width:460px;margin:0 auto;padding:24px 18px 60px;flex:1;width:100%;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px;text-align:center;}

  .state{padding:30px 0;color:var(--sub);font-size:14px;}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--navy);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .permit-id{font-size:12px;color:var(--sub);letter-spacing:.04em;}
  .permit-id b{display:block;color:var(--navy);font-size:20px;font-weight:700;margin-top:2px;}

  .status-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:999px;font-weight:700;font-size:15px;margin:16px 0;}
  .status-badge.approved{background:var(--ok-bg);color:var(--ok);}
  .status-badge.rejected{background:var(--bad-bg);color:var(--bad);}
  .status-badge.pending{background:var(--warn-bg);color:var(--warn);}
  .status-dot{width:10px;height:10px;border-radius:50%;background:currentColor;}

  .detail-list{text-align:left;margin-top:18px;border-top:1px solid var(--line);}
  .detail-row{display:flex;justify-content:space-between;gap:12px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:13.5px;}
  .detail-row .k{color:var(--sub);flex:none;}
  .detail-row .v{font-weight:600;text-align:right;}

  .foot-note{margin-top:20px;font-size:11.5px;color:var(--sub);}
  .error-box{color:var(--bad);font-size:14px;padding:20px 0;}

  .quiz-note{margin-top:16px;background:var(--warn-bg);color:var(--warn);border-radius:10px;padding:12px 14px;font-size:12.5px;text-align:left;}
  .quiz-note a{color:var(--warn);font-weight:700;}

  .guard-panel{margin-top:18px;border-top:2px dashed var(--line);padding-top:16px;}
  .guard-panel .g-who{font-size:12px;color:var(--sub);margin-bottom:10px;}
  .guard-panel .g-who b{color:var(--navy);}
  .scan-buttons{display:flex;gap:8px;}
  .scan-btn{flex:1;border:none;border-radius:10px;padding:13px 8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;}
  .scan-btn.in{background:var(--ok);}
  .scan-btn.out{background:var(--safety);}
  .scan-btn:disabled{background:#C9C3B6;cursor:not-allowed;}
  .scan-msg{margin-top:10px;font-size:13px;font-weight:600;}
  .scan-msg.ok{color:var(--ok);}
  .scan-msg.error{color:var(--bad);}

  .action-link{display:block;margin-top:12px;background:var(--navy);color:#fff;text-decoration:none;padding:12px;border-radius:10px;font-size:13.5px;font-weight:700;}
  .backbar{background:var(--navy-deep);padding:9px 16px;}
  .backbar a{color:#BFD8EC;text-decoration:none;font-size:12.5px;display:inline-flex;align-items:center;gap:6px;}
  .backbar a:hover{color:#fff;}
</style>
</head>
<body>

<div class="backbar"><a href="index.html">← กลับหน้าแรก</a></div>
<div class="topbar">
  <div class="co">บริษัท สยามกลการโลจิสติกส์ จำกัด · SAFETY FIRST</div>
  <h1>ตรวจสอบสถานะ Work Permit</h1>
</div>

<div class="wrap">
  <div class="card" id="card">
    <div class="state" id="loading">
      <div class="spinner"></div>
      กำลังตรวจสอบข้อมูล...
    </div>
  </div>
</div>

<script>
// ต้องเป็น URL เดียวกับ GOOGLE_SCRIPT_URL ใน request-permit.html
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuBtSfFMd4j3ESf-jvuE_VAZGx2NjERos1DKArLPige30uPni_5JkjMje2trqonjlD/exec";
const GUARD_STORAGE_KEY = "wp_guard_session";

const STATUS_MAP = {
  "อนุมัติ": { cls: "approved", label: "✅ อนุมัติแล้ว" },
  "ไม่อนุมัติ": { cls: "rejected", label: "❌ ไม่อนุมัติ" },
  "รออนุมัติ": { cls: "pending", label: "⏳ รออนุมัติ" }
};

function renderError(message){
  document.getElementById("card").innerHTML = `<div class="error-box">${message}</div>`;
}

function getGuardSession(){
  try { return JSON.parse(localStorage.getItem(GUARD_STORAGE_KEY) || "null"); } catch(e){ return null; }
}

function renderPermit(data){
  const statusInfo = STATUS_MAP[data.Status] || { cls: "pending", label: data.Status || "-" };

  const rows = [
    ["บริษัท", data.Company],
    ["สถานที่ปฏิบัติงาน", data.Work_Location],
    ["วันที่ปฏิบัติงาน", data.Work_Date],
    ["เวลา", `${data.Time_From || "-"}–${data.Time_To || "-"}`],
    ["จำนวนผู้ปฏิบัติงาน", data.Worker_Count || "-"]
  ];
  if (data.Approved_DateTime) {
    rows.push(["ตรวจสอบเมื่อ", data.Approved_DateTime]);
  }

  let quizNote = "";
  if (data.Status === "อนุมัติ" && data.Quiz_Required && !data.Quiz_Passed) {
    quizNote = `<div class="quiz-note">⚠️ งานนี้ต้องทำแบบทดสอบความปลอดภัยให้ผ่านก่อนจึงจะออกบัตรได้ — <a href="quiz.html?id=${encodeURIComponent(data.Permit_ID)}">ทำแบบทดสอบที่นี่</a></div>`;
  }

  let siteReportLink = "";
  if (data.Status === "อนุมัติ") {
    siteReportLink = `<a class="action-link" href="site-report.html?id=${encodeURIComponent(data.Permit_ID)}">📷 ส่งรูปประเมินพื้นที่ปฏิบัติงาน</a>`;
  }

  document.getElementById("card").innerHTML = `
    <div class="permit-id">เลขที่ Permit<b>${data.Permit_ID}</b></div>
    <div class="status-badge ${statusInfo.cls}"><span class="status-dot"></span>${statusInfo.label}</div>
    <div style="font-size:15px;font-weight:600;">${data.Requester_Name || "-"}</div>
    <div class="detail-list">
      ${rows.map(([k,v]) => `<div class="detail-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join("")}
    </div>
    ${quizNote}
    ${siteReportLink}
    <div id="guardPanel"></div>
    <div class="foot-note">ข้อมูลนี้แสดงเฉพาะรายละเอียดที่จำเป็นต่อการตรวจสอบหน้างานเท่านั้น</div>
  `;

  renderGuardPanel(data);
}

function renderGuardPanel(data){
  const guard = getGuardSession();
  const panel = document.getElementById("guardPanel");
  if (!guard || !guard.guardPin) { panel.innerHTML = ""; return; }
  if (data.Status !== "อนุมัติ") {
    panel.innerHTML = `<div class="guard-panel"><div class="g-who">รปภ.: <b>${guard.guardName}</b></div><div class="scan-msg error">Permit นี้ยังไม่ได้รับการอนุมัติ ไม่สามารถบันทึกเข้า-ออกได้</div></div>`;
    return;
  }
  panel.innerHTML = `
    <div class="guard-panel">
      <div class="g-who">สแกนโดย รปภ.: <b>${guard.guardName}</b> (${guard.guardCompany || "-"})</div>
      <div class="scan-buttons">
        <button class="scan-btn in" onclick="scan('เข้า')">✅ บันทึกเข้าพื้นที่</button>
        <button class="scan-btn out" onclick="scan('ออก')">🚪 บันทึกออกพื้นที่</button>
      </div>
      <div class="scan-msg" id="scanMsg"></div>
    </div>
  `;
}

async function scan(direction){
  const id = new URLSearchParams(window.location.search).get("id");
  const guard = getGuardSession();
  const msgBox = document.getElementById("scanMsg");
  document.querySelectorAll(".scan-btn").forEach(b => b.disabled = true);
  msgBox.className = "scan-msg";
  msgBox.textContent = "กำลังบันทึก...";
  try {
    const res = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "guardScan", permitId: id, guardPin: guard.guardPin, direction: direction })
    });
    const data = await res.json();
    document.querySelectorAll(".scan-btn").forEach(b => b.disabled = false);
    if (data.result !== "ok") {
      msgBox.className = "scan-msg error";
      msgBox.textContent = data.message || "บันทึกไม่สำเร็จ";
      return;
    }
    msgBox.className = "scan-msg ok";
    msgBox.textContent = `บันทึก "${direction}พื้นที่" เรียบร้อย (${new Date().toLocaleTimeString("th-TH")})`;
  } catch (err) {
    document.querySelectorAll(".scan-btn").forEach(b => b.disabled = false);
    msgBox.className = "scan-msg error";
    msgBox.textContent = "เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง";
  }
}

async function loadPermit(){
  const id = new URLSearchParams(window.location.search).get("id");
  if (!id) {
    renderError("ไม่พบเลขที่ Permit ใน URL — กรุณาสแกน QR Code จากเอกสาร Work Permit อีกครั้ง");
    return;
  }

  try {
    const res = await fetch(`${GOOGLE_SCRIPT_URL}?id=${encodeURIComponent(id)}`);
    const data = await res.json();
    if (data.result !== "ok") {
      renderError(data.message || "ไม่พบข้อมูล Permit นี้");
      return;
    }
    renderPermit(data);
  } catch (err) {
    renderError("เกิดข้อผิดพลาดในการตรวจสอบข้อมูล กรุณาลองใหม่อีกครั้ง");
  }
}
loadPermit();
</script>

</body>
</html>
